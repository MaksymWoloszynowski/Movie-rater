name: CI-CD

on:
  push:
    branches: [ "main" ]

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Set lowercase repo
        run: echo "REPO=${GITHUB_REPOSITORY,,}" >> $GITHUB_ENV

      - name: Build and push backend
        uses: docker/build-push-action@v6
        with:
          context: ./app/backend
          push: true
          tags: ghcr.io/${{ env.REPO }}/movie-rater-backend:${{ github.sha }}

      - name: Build and push frontend
        uses: docker/build-push-action@v6
        with:
          context: ./app/frontend
          push: true
          tags: ghcr.io/${{ env.REPO }}/movie-rater-frontend:${{ github.sha }}


  deploy:
    needs: build-and-push
    runs-on: ubuntu-latest

    steps:
      - name: Uruchom klaster kind
        uses: helm/kind-action@v1
        with:
          cluster_name: test-cluster

      - name: Set lowercase repo
        run: echo "REPO=${GITHUB_REPOSITORY,,}" >> $GITHUB_ENV

      - name: Załaduj obraz do kind
        run: |
          docker pull ghcr.io/${{ env.REPO }}/movie-rater-frontend:${{ github.sha }}
          kind load docker-image \
            ghcr.io/${{ env.REPO }}/movie-rater-frontend:${{ github.sha }} \
            --name test-cluster

      - name: Załaduj obraz do kind
        run: |
          docker pull ghcr.io/${{ env.REPO }}/movie-rater-backend:${{ github.sha }}
          kind load docker-image \
            ghcr.io/${{ env.REPO }}/movie-rater-backend:${{ github.sha }} \
            --name test-cluster

      - name: Wdróż system
        run: |
          kubectl apply -f k8s/
          kubectl set image deployment/backend-deployment \
            backend=ghcr.io/${{ env.REPO }}/movie-rater-backend:${{ github.sha }}
          kubectl set image deployment/frontend-deployment \
            backend=ghcr.io/${{ env.REPO }}/movie-rater-frontend:${{ github.sha }}

      - name: Poczekaj na gotowość Podów
        run: |
          kubectl rollout status deployment/postgres --timeout=120s
          kubectl rollout status deployment/backend --timeout=120s
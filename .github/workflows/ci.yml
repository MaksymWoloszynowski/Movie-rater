name: CI-CD

on:
  push:
    branches: [ "main" ]

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Set lowercase repo
        run: echo "REPO=${GITHUB_REPOSITORY,,}" >> $GITHUB_ENV

      - name: Build and push backend
        uses: docker/build-push-action@v6
        with:
          context: ./app/backend
          push: true
          tags: ghcr.io/${{ env.REPO }}/movie-rater-backend:${{ github.sha }}

      - name: Build and push frontend
        uses: docker/build-push-action@v6
        with:
          context: ./app/frontend
          push: true
          tags: ghcr.io/${{ env.REPO }}/movie-rater-frontend:${{ github.sha }}


  deploy:
    needs: build-and-push
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Uruchom klaster kind
        uses: helm/kind-action@v1
        with:
          cluster_name: test-cluster

      - name: Set lowercase repo
        run: echo "REPO=${GITHUB_REPOSITORY,,}" >> $GITHUB_ENV

      - name: Załaduj obraz do kind
        run: |
          docker pull ghcr.io/${{ env.REPO }}/movie-rater-frontend:${{ github.sha }}
          kind load docker-image \
            ghcr.io/${{ env.REPO }}/movie-rater-frontend:${{ github.sha }} \
            --name test-cluster

      - name: Załaduj obraz do kind
        run: |
          docker pull ghcr.io/${{ env.REPO }}/movie-rater-backend:${{ github.sha }}
          kind load docker-image \
            ghcr.io/${{ env.REPO }}/movie-rater-backend:${{ github.sha }} \
            --name test-cluster

      - name: Wdróż system
        run: |
          kubectl apply -f k8s/namespace.yaml
          ./run.sh
          kubectl config set-context --current --namespace=movie-rater

          kubectl set image deployment/backend-deployment \
            backend=ghcr.io/${{ env.REPO }}/movie-rater-backend:${{ github.sha }}
          kubectl set image deployment/frontend-deployment \
            frontend=ghcr.io/${{ env.REPO }}/movie-rater-frontend:${{ github.sha }}

      - name: Poczekaj na gotowość Podów
        run: |
          kubectl rollout status deployment/frontend-deployment
          kubectl rollout status deployment/redis-deployment --timeout=300s
          kubectl rollout status statefulset/postgres --timeout=300s
          kubectl rollout status deployment/backend-deployment --timeout=300s
        
      - name: Verify backend API
        run: |
            kubectl port-forward svc/backend-service 3000:3000 &
            sleep 5
            curl --fail http://localhost:3000/api/health
      
      - name: Debug cluster state
        if: failure()
        run: |
            echo "=== PODS ==="
            kubectl get pods -n movie-rater -o wide

            echo "=== DESCRIBE ==="
            kubectl describe pods -n movie-rater

            echo "=== BACKEND LOGS ==="
            kubectl logs -n movie-rater -l component=backend --tail=200 || true

            echo "=== EVENTS ==="
            kubectl get events -n movie-rater --sort-by=.metadata.creationTimestamp
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: backend-policy
  namespace: movie-rater
spec:
  podSelector:
    matchLabels:
      component: backend
  
  policyTypes:
    - Ingress
    - Egress

  ingress:
    - from:
      - podSelector:
          matchLabels:
            component: frontend
    
  egress:
    - to:
      - podSelector:
          matchLabels:
            component: postgres
      ports:
        - protocol: TCP
          port: 5432
    - to:
      - podSelector:
          matchLabels:
            component: redis
      ports:
        - protocol: TCP
          port: 6379
    
